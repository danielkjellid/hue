name: docs

# Builds the hue-docs static site and deploys it to GitHub Pages.
#
# Note: GitHub Pages *project* sites are served from a subpath
# (https://<user>.github.io/<repo>/), but the site uses root-relative asset
# URLs (/styles/..., /js/...). For a working deploy, either use a custom domain
# (served at the root) or deploy hue-docs/dist to Vercel / Cloudflare Pages /
# Netlify with the output directory set to `hue-docs/dist`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build the docs site
        working-directory: hue-docs
        run: |
          uv venv --python 3.13
          uv sync
          PYTHONPATH=src uv run python -m hue_docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hue-docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
